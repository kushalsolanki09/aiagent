<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>new chat</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .right2 {
      display: none;
    }
    </style>
</head>

<body class="bg-chatblack-50">
  <div class="flex h-[100vh] text-white">

    <div class="left bg-black w-2/12">
      <button
        class="w-[90%] py-2 m-2 px-10 space-x-2 border-white border rounded-md flex mx-4 justify-start items-center hover:opacity-70">
        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
          stroke-linejoin="round" class="h-4 w-4" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>New Chat</span>
      </button>
      <div class="text-xs m-4 mx-8 text-gray-400">Today</div>
      <div class="chats flex flex-col justify-center items-center space-y-2">


        {% for chat in myChats %}
        <div
          class="chat space-x-2 opacity-80 w-[90%] px-5 py-2 rounded-md bg-gray-600 cursor-pointer flex justify-start items-center">
          <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
            stroke-linejoin="round" class="h-4 w-4" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span>{{chat.question}}</span>
        </div>
        {% endfor %}

      </div>
    </div>


    <div class="right1 w-10/12 flex justify-center items-center flex-col">
      <div class="text-center w-full text-4xl font-bold">
        Mobile Agent

      </div>
      <div class="itemsrow flex py-4 w-[43vw] justify-around">
        <div class="examples flex flex-col justify-center items-center">
          <svg stroke="currentColor" fill="none" stroke-width="1.5" viewBox="0 0 24 24" stroke-linecap="round"
            stroke-linejoin="round" class="h-6 w-6" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <div>example</div>
          <button class="bg-gray-600 w-[13vw] text-sm hover:bg-gray-700 py-4 px-4 mx-4  my-2 rounded-md">"Battery king
            with fast charging,around 15k" →</button>
          <button class="bg-gray-600 w-[13vw] text-sm hover:bg-gray-700 py-4 px-4 mx-4  my-2 rounded-md">"Compare pixel
            8a vs OnePlus 12R" →</button>

        </div>


        <div class="examples flex flex-col justify-center items-center">
          <svg stroke="currentColor" fill="none" stroke-width="1.5" viewBox="0 0 24 24" stroke-linecap="round"
            stroke-linejoin="round" class="h-6 w-6" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <div>example</div>
          <button class="bg-gray-600 w-[13vw] text-sm hover:bg-gray-700 py-4 px-4 mx-4  my-2 rounded-md">"Compact
            Android with good one-hand use" →</button>
          <button class="bg-gray-600 w-[13vw] text-sm hover:bg-gray-700 py-4 px-4 mx-4  my-2 rounded-md">"Best camera
            under 30,000?" →</button>

        </div>



        <div class="examples flex flex-col justify-center items-center">
          <svg stroke="currentColor" fill="none" stroke-width="1.5" viewBox="0 0 24 24" stroke-linecap="round"
            stroke-linejoin="round" class="h-6 w-6" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <div>example</div>
          <button class="bg-gray-600 w-[13vw] text-sm hover:bg-gray-700 py-4 px-4 mx-4  my-2 rounded-md">"show me only
            samsung phone under 25k " →</button>
          <button class="bg-gray-600 w-[13vw] text-sm hover:bg-gray-700 py-4 px-4 mx-4  my-2 rounded-md">"I ike this
            phone ,tell me more details" →</button>

        </div>


      </div>



      <div class="input w-full text-center my-24 flex items-center justify-center flex-col">
        <div class="buttonsvg pl-16 w-[50vw] flex">
          <input class="w-full p-4 bg-gray-600 rounded-md" placeholder="Send a Message" type="text" name="text"
            id="questionInput">

          <button id="sendButton" class=" relative -left-20 pl-10">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
              stroke-linejoin="round" class="h-4 w-4 mr-1" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>

      </div>



    </div>

    <div class="right2 w-full flex flex-col items-center h-fit">
      
      <div class="box1 m-auto py-7 flex justify-start w-[40vw] items-center space-x-6">
            <div> </div>
      </div>
      <div class="box2 bg-gray-600 py-7 flex justify-center w-full items-center">
            <div class="box w-[40vw] flex justify-start space-x-6 ">
              <div class="flex space-y-4 flex-col">
                <div id="question">hii..thanks for using Mobile agent to chose your phone </div>
                <div id="solution">there are many phones for your budget...what type of phone do you want...have you any type of scenario </div>

              </div>
            </div>
      </div>
      <div class="input pt-[296px] w-full text-center my-24 flex items-center justify-center flex-col">
        <div class="buttonsvg pl-16 w-[50vw] flex">
          <input class="w-full p-4 bg-gray-600 rounded-md" placeholder="Send a Message" type="text" name="text"
            id="questionInput">

          <button  class="relative -left-20 pl-10">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round"
              stroke-linejoin="round" class="h-4 w-4 mr-1" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>

      </div>

       
    </div>


</body>
 <script src="/static/js/script.js"></script>
</html>
